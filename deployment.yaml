apiVersion: apps/v1
kind: Deployment

metadata:
  name: notes-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: notes-app

  template:

    metadata:
      labels:
        app: notes-app

    spec:

      containers:

      - name: notes-app

        image: aadi03docker/notes-app:v5

        ports:
        - containerPort: 5000

        env:

        - name: MYSQL_HOST
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: MYSQL_HOST

        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: MYSQL_DATABASE

        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD